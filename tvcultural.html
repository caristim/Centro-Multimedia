<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TV Cultural</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/tvbrasil.css">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.svg">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
  <main id="tvcultural-app">
    <header class="tv-header">
      <button id="back-button" class="back-btn" aria-label="Volver al inicio">⬅️</button>
      <h1>🌍 TV Cultural</h1>
      <span></span>
    </header>
    <div id="player-wrap" class="player-wrap" hidden>
      <video id="tv-video" class="tv-video" controls playsinline></video>
      <div class="player-info-bar">
        <span id="current-channel-name">—</span>
        <button id="close-player" class="close-player-btn" aria-label="Cerrar reproductor">✖️ Cerrar</button>
      </div>
    </div>
    <section id="channels-list" role="list"></section>
  </main>
  <script src="js/tvplayer.js?v=2"></script>
  <script src="js/tvcultural.js?v=2"></script>
</body>
</html>
